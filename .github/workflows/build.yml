name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux-x86_64
            artifact_ext: tar.gz
          - os: windows-2022
            os_name: windows-x86_64
            artifact_ext: zip
          - os: macos-13
            os_name: macos-x86_64
            artifact_ext: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xxhash

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm arc20_explorer.spec

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DIST_NAME="arc20-explorer-v${VERSION}-${{ matrix.os_name }}"
          mkdir -p "dist/${DIST_NAME}"
          cp dist/arc20-explorer "dist/${DIST_NAME}/"
          cp README.md LICENSE "dist/${DIST_NAME}/"
          cp -r i18n "dist/${DIST_NAME}/i18n_source"
          cd dist
          tar czf "${DIST_NAME}.tar.gz" "${DIST_NAME}/"
          cd ..
          ls -la dist/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $DIST_NAME = "arc20-explorer-v$VERSION-${{ matrix.os_name }}"
          New-Item -ItemType Directory -Path "dist/$DIST_NAME" -Force
          Copy-Item "dist/arc20-explorer.exe" -Destination "dist/$DIST_NAME/"
          Copy-Item "README.md" -Destination "dist/$DIST_NAME/"
          Copy-Item "LICENSE" -Destination "dist/$DIST_NAME/"
          Copy-Item -Recurse "i18n" -Destination "dist/$DIST_NAME/i18n_source"
          Compress-Archive -Path "dist/$DIST_NAME" -DestinationPath "dist/$DIST_NAME.zip"
          Get-ChildItem dist/

      - name: Generate checksums (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILE="arc20-explorer-v${VERSION}-${{ matrix.os_name }}.${{ matrix.artifact_ext }}"
          OUTFILE="${FILE}.checksums.txt"
          echo "ARC-20 Explorer · Bitwork Labs · Verification checksums" > "$OUTFILE"
          echo "File: $FILE" >> "$OUTFILE"
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUTFILE"
          echo "" >> "$OUTFILE"
          XX=$(xxhsum -H64 "$FILE" | awk '{print $1}')
          SHA=$(sha256sum "$FILE" | cut -d' ' -f1)
          MD=$(md5sum "$FILE" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$FILE")
          echo "  xxh64:  $XX" >> "$OUTFILE"
          echo "  sha256: $SHA" >> "$OUTFILE"
          echo "  md5:    $MD" >> "$OUTFILE"
          echo "  bytes:  $SIZE" >> "$OUTFILE"
          cat "$OUTFILE"

      - name: Generate checksums (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILE="arc20-explorer-v${VERSION}-${{ matrix.os_name }}.${{ matrix.artifact_ext }}"
          OUTFILE="${FILE}.checksums.txt"
          echo "ARC-20 Explorer · Bitwork Labs · Verification checksums" > "$OUTFILE"
          echo "File: $FILE" >> "$OUTFILE"
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUTFILE"
          echo "" >> "$OUTFILE"
          SHA=$(shasum -a 256 "$FILE" | cut -d' ' -f1)
          MD=$(md5 -q "$FILE")
          SIZE=$(stat -f%z "$FILE")
          echo "  sha256: $SHA" >> "$OUTFILE"
          echo "  md5:    $MD" >> "$OUTFILE"
          echo "  bytes:  $SIZE" >> "$OUTFILE"
          cat "$OUTFILE"

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $FILE = "arc20-explorer-v$VERSION-${{ matrix.os_name }}.zip"
          $OUTFILE = "$FILE.checksums.txt"
          $sha256 = (Get-FileHash -Algorithm SHA256 $FILE).Hash.ToLower()
          $md5 = (Get-FileHash -Algorithm MD5 $FILE).Hash.ToLower()
          $size = (Get-Item $FILE).Length
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          Set-Content -Path $OUTFILE -Value "ARC-20 Explorer · Bitwork Labs · Verification checksums"
          Add-Content -Path $OUTFILE -Value "File: $FILE"
          Add-Content -Path $OUTFILE -Value "Generated: $date"
          Add-Content -Path $OUTFILE -Value ""
          Add-Content -Path $OUTFILE -Value "  sha256: $sha256"
          Add-Content -Path $OUTFILE -Value "  md5:    $md5"
          Add-Content -Path $OUTFILE -Value "  bytes:  $size"
          Get-Content $OUTFILE

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arc20-explorer-${{ matrix.os_name }}
          path: |
            dist/arc20-explorer-v*.${{ matrix.artifact_ext }}
            dist/arc20-explorer-v*.checksums.txt
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -type f -name "*.zip" -exec cp {} release/ \;
          find artifacts -type f -name "*.checksums.txt" -exec cp {} release/ \;
          ls -la release/

      - name: Combine all checksums
        run: |
          cd release
          OUTFILE="checksums.txt"
          echo "ARC-20 Explorer · Bitwork Labs · Combined checksums" > "$OUTFILE"
          echo "Tag: ${GITHUB_REF#refs/tags/}" >> "$OUTFILE"
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUTFILE"
          echo "" >> "$OUTFILE"
          for f in *.checksums.txt; do
            if [ "$f" != "checksums.txt" ] && [ -f "$f" ]; then
              cat "$f" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
              echo "─────────────────────────────────────────" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
            fi
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt
          generate_release_notes: true
          draft: true
          name: ARC-20 Explorer ${{ github.ref_name }}
