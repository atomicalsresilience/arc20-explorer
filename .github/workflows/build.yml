name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux-x86_64
            artifact_ext: tar.gz
            python_arch: x64
          - os: windows-2022
            os_name: windows-x86_64
            artifact_ext: zip
            python_arch: x64
          - os: macos-13
            os_name: macos-x86_64
            artifact_ext: tar.gz
            python_arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # ─── LINUX ─────────────────────────────────────
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xxhash

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── BUILD ─────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm arc20_explorer.spec

      # ─── PACKAGE LINUX/MAC ─────────────────────────
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DIST_NAME="arc20-explorer-v${VERSION}-${{ matrix.os_name }}"
          mkdir -p "dist/${DIST_NAME}"
          cp dist/arc20-explorer "dist/${DIST_NAME}/"
          cp README.md LICENSE "dist/${DIST_NAME}/"
          cp -r i18n "dist/${DIST_NAME}/i18n_source"
          cd dist
          tar czf "${DIST_NAME}.tar.gz" "${DIST_NAME}/"
          cd ..
          ls -la dist/

      # ─── PACKAGE WINDOWS ───────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $DIST_NAME = "arc20-explorer-v$VERSION-${{ matrix.os_name }}"
          New-Item -ItemType Directory -Path "dist/$DIST_NAME" -Force
          Copy-Item "dist/arc20-explorer.exe" -Destination "dist/$DIST_NAME/"
          Copy-Item "README.md" -Destination "dist/$DIST_NAME/"
          Copy-Item "LICENSE" -Destination "dist/$DIST_NAME/"
          Copy-Item -Recurse "i18n" -Destination "dist/$DIST_NAME/i18n_source"
          Compress-Archive -Path "dist/$DIST_NAME" -DestinationPath "dist/$DIST_NAME.zip"
          Get-ChildItem dist/

      # ─── CHECKSUMS ─────────────────────────────────
      - name: Generate checksums (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          VERSION=${{ steps.version.outputs.VERSION }}
          FILE="arc20-explorer-v${VERSION}-${{ matrix.os_name }}.${{ matrix.artifact_ext }}"
          OUTFILE="${FILE}.checksums.txt"
          {
            echo "ARC-20 Explorer · Bitwork Labs · Verification checksums"
            echo "File: $FILE"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            if command -v xxhsum >/dev/null 2>&1; then
              echo "  xxh64:  $(xxhsum -H64 "$FILE" | awk '{print $1}')"
            fi
            echo "  sha256: $(shasum -a 256 "$FILE" | cut -d' ' -f1)"
            echo "  md5:    $(md5sum "$FILE" 2>/dev/null | cut -d' ' -f1 || md5 -q "$FILE")"
            echo "  bytes:  $(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")"
          } > "$OUTFILE"
          cat "$OUTFILE"

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $FILE = "arc20-explorer-v$VERSION-${{ matrix.os_name }}.zip"
          $OUTFILE = "$FILE.checksums.txt"
          $sha256 = (Get-FileHash -Algorithm SHA256 $FILE).Hash.ToLower()
          $md5 = (Get-FileHash -Algorithm MD5 $FILE).Hash.ToLower()
          $size = (Get-Item $FILE).Length
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          @"
ARC-20 Explorer · Bitwork Labs · Verification checksums
File: $FILE
Generated: $date

  sha256: $sha256
  md5:    $md5
  bytes:  $size
"@ | Out-File -FilePath $OUTFILE -Encoding utf8
          Get-Content $OUTFILE

      # ─── UPLOAD ────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arc20-explorer-${{ matrix.os_name }}
          path: |
            dist/arc20-explorer-v*.${{ matrix.artifact_ext }}
            dist/arc20-explorer-v*.checksums.txt
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.checksums.txt" \) -exec cp {} release/ \;
          ls -la release/

      - name: Combine all checksums
        run: |
          cd release
          {
            echo "ARC-20 Explorer · Bitwork Labs · Combined checksums"
            echo "Tag: ${GITHUB_REF#refs/tags/}"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            for f in *.checksums.txt; do
              [ -f "$f" ] || continue
              cat "$f"
              echo ""
              echo "─────────────────────────────────────────"
              echo ""
            done
          } > checksums.txt
          rm -f *.checksums.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt
          generate_release_notes: true
          draft: true
          name: ARC-20 Explorer ${{ github.ref_name }}
          body: |
            # ARC-20 Explorer ${{ github.ref_name }}

            Standalone desktop app to explore your ARC-20 tokens, Realms and Bitcoin UTXOs on the Atomicals Protocol.

            ## Downloads

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `arc20-explorer-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | Windows x86_64 | `arc20-explorer-${{ github.ref_name }}-windows-x86_64.zip` |
            | macOS Intel | `arc20-explorer-${{ github.ref_name }}-macos-x86_64.tar.gz` |

            ## Verify checksums

            See `checksums.txt` for SHA-256, xxh64 and MD5 hashes of all binaries.

```bash
            sha256sum arc20-explorer-${{ github.ref_name }}-linux-x86_64.tar.gz
```

            Compare with the value in `checksums.txt`.

            ## Languages

            11 supported: EN, ZH, ES, KO, RU, JA, PT, VI, TR, ID, FR
            Native review wanted — see README.

            ⚛ **Powered by Bitwork Labs** · _First Bitwork PoW deterministic protocol on BTC_
            
            Donate: `bc1puu9akjm00lunuvx4zceve6at3dhtlg6cv84whrz25xpzastrjfzqh54ukv`
